name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-audit:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit --registry=https://registry.npmjs.org/

      - name: Package dry run
        run: npm run pack:dry-run
